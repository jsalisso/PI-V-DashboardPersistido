<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AirGuard Dashboard PI-V v2.0</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AirGuard - Dashboard PI</h1>
      <p>Resumo atual + consulta histórica por sensor e período</p>
    </div>

    <div class="panel">
      <h2>Resumo Atual</h2>
      <div id="statusOverview" class="status-text">Carregando overview...</div>
      <div id="overviewCards" class="cards-grid"></div>
    </div>

    <div class="panel">
      <h2>Consulta de Histórico</h2>

      <div class="filters-grid">
        <div class="field">
          <label for="sensorSelect">Sensor</label>
          <select id="sensorSelect"></select>
        </div>

        <div class="field">
          <label for="dateInput">Data</label>
          <input type="date" id="dateInput" />
        </div>

        <div class="field">
          <label for="startTimeInput">Hora inicial</label>
          <input type="time" id="startTimeInput" />
        </div>

        <div class="field">
          <label for="endTimeInput">Hora final</label>
          <input type="time" id="endTimeInput" />
        </div>

        <div class="field">
          <label for="limitInput">Limite</label>
          <input type="number" id="limitInput" value="100" min="1" max="1000" />
        </div>
      </div>

      <div class="toolbar">
        <button id="loadHistoryBtn">Consultar histórico</button>
      </div>

      <div id="historyStatus" class="status-text">Selecione os filtros e consulte o histórico.</div>

      <div class="table-wrapper">
        <table id="historyTable">
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Status</th>
              <th>CO</th>
              <th>Gás</th>
              <th>Temp</th>
              <th>Umidade</th>
              <th>Presença</th>
            </tr>
          </thead>
          <tbody id="historyTableBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
